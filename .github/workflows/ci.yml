name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Install App dependencies
        working-directory: app
        run: npm ci

      - name: Typecheck API
        working-directory: api
        run: npm run typecheck

      - name: Typecheck App
        working-directory: app
        run: npm run typecheck

  api-tests:
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tongzhou
          POSTGRES_PASSWORD: tongzhou
          POSTGRES_DB: tongzhou_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tongzhou -d tongzhou_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Run API integration tests
        working-directory: api
        env:
          TEST_PG_DATABASE_URL: postgres://tongzhou:tongzhou@127.0.0.1:5432/tongzhou_test
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Install App dependencies
        working-directory: app
        run: npm ci

      - name: Install Playwright browsers
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        working-directory: app
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report
          if-no-files-found: ignore
