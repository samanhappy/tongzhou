# 同舟 · 基础设施
#
# 本地开发：
#   docker compose up -d postgres            # 只起数据库
#   docker compose up -d --build             # 本地构建并启动所有服务
#
# 生产（服务器上）：镜像由 GitHub Actions 构建并推送到 GHCR
#   docker compose pull                      # 拉取最新镜像
#   docker compose up -d                     # 启动 / 滚动更新
#   docker compose down -v                   # 干净停掉（连数据卷一起删）
#
# IMAGE_TAG 默认为 latest；也可指定具体 sha：IMAGE_TAG=<sha> docker compose pull
# IMAGE_REPO 默认 ghcr.io/samanhappy；fork 后可在 .env 中覆盖。
# 生产环境需要在 api/.env 中配置正式参数（参考 api/.env.example）。

services:
  postgres:
    image: postgres:16-alpine
    container_name: tongzhou-pg
    environment:
      POSTGRES_USER: tongzhou
      POSTGRES_PASSWORD: tongzhou
      POSTGRES_DB: tongzhou
    ports:
      - "5432:5432"
    volumes:
      - tz-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tongzhou -d tongzhou"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    image: ${IMAGE_REPO:-ghcr.io/samanhappy}/tongzhou-api:${IMAGE_TAG:-latest}
    build:
      context: ./api
    container_name: tongzhou-api
    env_file:
      - ./api/.env
    ports:
      - "4100:4100"
    volumes:
      - api-data:/app/data
      - api-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  app:
    image: ${IMAGE_REPO:-ghcr.io/samanhappy}/tongzhou-app:${IMAGE_TAG:-latest}
    build:
      context: ./app
    container_name: tongzhou-app
    environment:
      - API_BASE=http://api:4100
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  # 可选：V0 暂不上 redis，留口
  # redis:
  #   image: redis:7-alpine
  #   ports: ["6379:6379"]

volumes:
  tz-pg-data:
  api-data:
  api-uploads:
