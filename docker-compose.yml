# 同舟 · 基础设施
#
# 本地开发：
#   docker compose up -d postgres   # 只起数据库
#
# 生产（服务器上）：
#   docker compose up -d --build    # 构建并启动所有服务
#   docker compose down -v          # 干净停掉（连数据卷一起删）
#
# 生产环境需要在 api/.env 中配置正式参数（参考 api/.env.example）。

services:
  postgres:
    image: postgres:16-alpine
    container_name: tongzhou-pg
    environment:
      POSTGRES_USER: tongzhou
      POSTGRES_PASSWORD: tongzhou
      POSTGRES_DB: tongzhou
    ports:
      - "5432:5432"
    volumes:
      - tz-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tongzhou -d tongzhou"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./api
    container_name: tongzhou-api
    env_file:
      - ./api/.env
    ports:
      - "4100:4100"
    volumes:
      - api-data:/app/data
      - api-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  app:
    build:
      context: ./app
    container_name: tongzhou-app
    environment:
      - API_BASE=http://api:4100
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  # 可选：V0 暂不上 redis，留口
  # redis:
  #   image: redis:7-alpine
  #   ports: ["6379:6379"]

volumes:
  tz-pg-data:
  api-data:
  api-uploads:
