# 同舟 · 本地基础设施
#
# 用法：
#   docker compose up -d        # 起 Postgres
#   docker compose down -v      # 干净停掉(连数据卷一起删)
#
# 默认账号(api/.env.example 的 DATABASE_URL 已对齐):
#   user: tongzhou / password: tongzhou / db: tongzhou / port: 5432
#
# 测试 RLS：
#   docker compose exec postgres psql -U tongzhou -d tongzhou \
#     -c "SELECT set_config('app.tenant_id', 'fake', false); SELECT * FROM tracks;"
#   → 应返回 0 行(RLS 策略命中,fake tenant 看不到任何 track)

services:
  postgres:
    image: postgres:16-alpine
    container_name: tongzhou-pg
    environment:
      POSTGRES_USER: tongzhou
      POSTGRES_PASSWORD: tongzhou
      POSTGRES_DB: tongzhou
    ports:
      - "5432:5432"
    volumes:
      - tz-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tongzhou -d tongzhou"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 可选：V0 暂不上 redis,留口
  # redis:
  #   image: redis:7-alpine
  #   ports: ["6379:6379"]

volumes:
  tz-pg-data:
